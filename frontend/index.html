<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kgrammar — Korean Grammar Checker</title>
  <meta name="description" content="Paste Korean text and get instant grammar corrections with explanations. Free AI-powered Korean grammar checker." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TMLC6M636K"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-TMLC6M636K");
  </script>
</head>
<body>

  <header class="kg-header">
    <div class="kg-header-inner">
      <div class="kg-logo">k<span>grammar</span></div>
      <span class="kg-badge">beta</span>
    </div>
  </header>

  <main class="kg-main">
    <div class="kg-hero">
      <h1 class="kg-title">Korean Grammar Checker.</h1>
      <p class="kg-subtitle">Enter, upload or drag a snapshot of your Korean text for the English translation.</p>
    </div>

    <div class="kg-panels">
      <div class="kg-panel" id="left-panel">
        <div class="kg-panel-header">
          <span class="kg-panel-label">ENTER OR DRAG YOUR KOREAN TEXT HERE</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="kg-char-count" id="char-count">0 / 500</span>
            <button class="kg-copy-btn" onclick="clearAll()">Clear</button>
          </div>
        </div>
        <div class="kg-drop-zone" id="drop-zone">
          <textarea
            class="kg-input"
            id="input-text"
            placeholder="여기에 한국어를 입력하거나 붙여넣으세요..."
            maxlength="500"
            aria-label="Korean text input"
          ></textarea>
          <div class="kg-drop-overlay" id="drop-overlay">
            <div class="kg-drop-message">
              <span>📷</span>
              <span>Drop image to extract Korean text</span>
            </div>
          </div>
        </div>
        <div class="kg-panel-footer">
          <label class="kg-copy-btn kg-upload-btn">
            📷 Upload image
            <input type="file" id="image-upload" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />
          </label>
        </div>
      </div>

      <div class="kg-panel">
        <div class="kg-panel-header">
          <span class="kg-panel-label">Checked</span>
          <div style="display:flex;align-items:center;gap:6px;">
            <button class="kg-copy-btn" id="copy-btn" style="display:none" onclick="copyResult()">Copy</button>
            <button class="kg-copy-btn" id="listen-btn" onclick="listenKorean()">🔊 Listen</button>
          </div>
        </div>
        <div class="kg-output" id="output" aria-live="polite">
          <span class="kg-placeholder">Corrections will appear here...</span>
        </div>
      </div>
    </div>

    <div class="kg-cta-row">
      <button class="kg-btn kg-btn-primary kg-btn-cta" id="translate-btn" onclick="translateText()">
        Translate
      </button>
      <button class="kg-btn kg-btn-primary kg-btn-cta" id="check-btn" onclick="checkGrammar()">
        Check Grammar
      </button>
    </div>

    <div class="kg-explanations" id="explanations">
      <div class="kg-exp-header">What was corrected</div>
      <div class="kg-exp-body" id="exp-body"></div>
    </div>
  </main>

  <footer class="kg-footer">
    <p>kgrammar.com</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
